<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>APOPHENOTH v2.0 — The Ascension</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #07060e;
  --surface: rgba(10, 14, 28, 0.88);
  --surface2: rgba(16, 22, 40, 0.92);
  --border: rgba(255, 255, 255, 0.06);
  --glass: rgba(10, 14, 28, 0.75);
  --text: #c8d0e0;
  --text-dim: #6a7290;
  --cyan: #00d4ff;
  --gold: #ffd700;
  --pink: #ff6b9d;
  --purple: #8800ff;
  --green: #228B22;
  --void: #666;
}

body {
  background: var(--bg);
  font-family: 'Segoe UI', system-ui, sans-serif;
  overflow: hidden;
  cursor: crosshair;
  user-select: none;
  color: var(--text);
}

/* === CANVAS LAYERS === */
#starfield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
#game-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
#fx-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }

/* === GLASS MIXIN === */
.glass {
  background: var(--glass);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border);
  border-radius: 12px;
}

/* === MENU === */
#menu {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 100;
  background: radial-gradient(ellipse at 50% 30%, #0f0620 0%, #07060e 60%, #000 100%);
}
#menu.hidden { display: none; }

.menu-box {
  background: var(--surface2);
  border: 1px solid rgba(0, 212, 255, 0.2);
  padding: 35px 50px;
  text-align: center;
  border-radius: 20px;
  box-shadow: 0 0 80px rgba(0, 212, 255, 0.08), inset 0 0 60px rgba(0, 212, 255, 0.02);
  max-width: 820px;
  width: 95%;
  max-height: 90vh;
  overflow-y: auto;
}
.menu-box::-webkit-scrollbar { width: 3px; }
.menu-box::-webkit-scrollbar-track { background: transparent; }
.menu-box::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 2px; }

.menu-title {
  font-size: 52px;
  font-weight: 900;
  background: linear-gradient(135deg, var(--gold), var(--cyan), var(--pink), var(--purple), var(--gold));
  background-size: 400% 100%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: titleFlow 6s linear infinite;
  letter-spacing: 8px;
  line-height: 1.1;
}
.menu-subtitle {
  color: var(--text-dim);
  font-size: 14px;
  letter-spacing: 12px;
  margin-bottom: 25px;
}

@keyframes titleFlow {
  0% { background-position: 0% 50%; }
  100% { background-position: 400% 50%; }
}

.begin-btn {
  width: 100%;
  font-size: 22px;
  font-weight: bold;
  color: var(--cyan);
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.08), transparent);
  border: 1px solid rgba(0, 212, 255, 0.3);
  padding: 16px 50px;
  cursor: pointer;
  letter-spacing: 6px;
  transition: all 0.4s;
  margin-bottom: 22px;
  border-radius: 12px;
  position: relative;
  overflow: hidden;
}
.begin-btn.secondary {
  font-size: 16px;
  padding: 10px 30px;
  letter-spacing: 3px;
  margin-bottom: 0;
  color: var(--gold);
  border-color: rgba(255,215,0,0.3);
  background: linear-gradient(135deg, rgba(255,215,0,0.06), transparent);
}
.begin-btn.secondary:hover {
  background: rgba(255,215,0,0.12);
  border-color: var(--gold);
  box-shadow: 0 0 30px rgba(255,215,0,0.15);
}
.begin-row { display: flex; gap: 8px; margin-bottom: 22px; }
.begin-row .begin-btn { margin-bottom: 0; }
}

.path-title {
  color: var(--gold);
  font-size: 11px;
  letter-spacing: 4px;
  margin-bottom: 14px;
  text-transform: uppercase;
}

.path-options {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 20px;
}

.path-btn {
  background: rgba(0, 0, 0, 0.5);
  border: 1px solid rgba(255, 255, 255, 0.08);
  padding: 14px 18px;
  cursor: pointer;
  transition: all 0.3s;
  min-width: 100px;
  border-radius: 12px;
}
.path-btn:hover {
  border-color: var(--cyan);
  background: rgba(0, 212, 255, 0.06);
  transform: translateY(-4px);
  box-shadow: 0 8px 25px rgba(0, 212, 255, 0.08);
}
.path-btn.selected {
  border-color: var(--cyan);
  background: rgba(0, 212, 255, 0.1);
  box-shadow: 0 0 25px rgba(0, 212, 255, 0.2);
}
.path-btn .icon { font-size: 28px; display: block; margin-bottom: 6px; }
.path-btn .name { font-size: 11px; color: var(--cyan); font-weight: bold; letter-spacing: 1px; }
.path-btn .desc { font-size: 8px; color: var(--text-dim); margin-top: 3px; }
.path-btn .bonus { font-size: 8px; color: var(--green); margin-top: 2px; }

.instructions {
  color: var(--text-dim);
  font-size: 10px;
  line-height: 2;
  border-top: 1px solid rgba(255,255,255,0.04);
  padding-top: 14px;
}

/* === GAME HUD === */
#hud {
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  padding: 14px 20px;
  z-index: 20;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: start;
  pointer-events: none;
}
#hud > * { pointer-events: auto; }

#hud-left { display: flex; flex-direction: column; gap: 6px; }
#hud-center { text-align: center; }
#hud-right { text-align: right; }

.hud-panel {
  background: var(--glass);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 14px;
  display: inline-block;
}

#title-display {
  font-size: 13px;
  letter-spacing: 4px;
  color: var(--text-dim);
}
#title-display strong { color: var(--cyan); }

#phase-display {
  font-size: 14px;
  font-weight: bold;
  color: var(--gold);
  letter-spacing: 2px;
}
#phase-track {
  width: 180px;
  height: 4px;
  background: rgba(255,255,255,0.06);
  border-radius: 2px;
  margin: 5px auto 0;
  overflow: hidden;
}
#phase-progress {
  height: 100%;
  width: 0%;
  border-radius: 2px;
  background: linear-gradient(90deg, var(--cyan), var(--pink), var(--gold));
  transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 0 12px var(--cyan);
}

/* === STAT ROW === */
#stat-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 6px;
}
.stat-pill {
  background: var(--glass);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border);
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 9px;
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}
.stat-pill .s-icon { font-size: 11px; }
.stat-pill .s-label { color: var(--text-dim); }
.stat-pill .s-value { color: var(--gold); font-weight: bold; font-size: 11px; min-width: 30px; text-align: right; }

#right-meta {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
}
#moon-icon-hud { font-size: 28px; filter: drop-shadow(0 0 8px var(--gold)); }
#day-text-hud { font-size: 10px; color: var(--text-dim); }
#entangle-hud { font-size: 10px; color: var(--purple); font-weight: bold; }

/* === CONTROLS === */
#controls-wrap {
  position: fixed;
  bottom: 16px;
  right: 16px;
  z-index: 30;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.action-btn {
  padding: 8px 16px;
  font-size: 10px;
  font-weight: 600;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.25s;
  text-align: left;
  letter-spacing: 0.5px;
  border: 1px solid var(--border);
  background: var(--glass);
  backdrop-filter: blur(8px);
  color: var(--text);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  min-width: 140px;
}
.action-btn:hover:not(:disabled) {
  border-color: var(--cyan);
  background: rgba(0, 212, 255, 0.08);
  box-shadow: 0 0 15px rgba(0, 212, 255, 0.08);
  transform: translateX(-3px);
}
.action-btn:disabled { opacity: 0.25; cursor: not-allowed; }
.action-btn .ab-key {
  font-size: 8px;
  background: rgba(255,255,255,0.06);
  padding: 2px 6px;
  border-radius: 3px;
  color: var(--text-dim);
}

/* === LOGS === */
#logs {
  position: fixed;
  top: 110px;
  left: 16px;
  width: 210px;
  max-height: 130px;
  overflow-y: auto;
  font-size: 9px;
  color: rgba(0, 212, 255, 0.5);
  background: var(--glass);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border);
  padding: 10px;
  border-radius: 10px;
  z-index: 25;
}
#logs::-webkit-scrollbar { width: 2px; }
#logs::-webkit-scrollbar-track { background: transparent; }
#logs::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 1px; }

/* === ABILITY DISPLAY === */
#ability-box {
  position: fixed;
  bottom: 16px;
  left: 16px;
  background: var(--glass);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 9px;
  z-index: 25;
  min-width: 170px;
}
#ability-box .ab-title {
  font-size: 10px;
  color: var(--gold);
  font-weight: bold;
  margin-bottom: 6px;
  letter-spacing: 2px;
}
#ability-box .ab-row {
  display: flex;
  justify-content: space-between;
  margin: 2px 0;
  color: var(--text-dim);
}
#ability-box .ab-row .ab-val { color: var(--gold); font-weight: bold; }

/* === ALIGNMENT === */
#align-toggle {
  position: fixed;
  top: 110px;
  left: 236px;
  z-index: 35;
  background: var(--glass);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 5px 10px;
  font-size: 8px;
  cursor: pointer;
  border-radius: 6px;
  letter-spacing: 1px;
}
#align-toggle:hover { border-color: var(--cyan); color: var(--cyan); }

#align-panel {
  position: fixed;
  top: 140px;
  left: 16px;
  width: 220px;
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 12px;
  border-radius: 12px;
  z-index: 30;
  font-size: 9px;
  display: none;
}
#align-panel.show { display: block; }
#align-panel .ap-title { font-size: 10px; color: var(--gold); font-weight: bold; margin-bottom: 8px; letter-spacing: 2px; }
.align-row {
  display: flex;
  align-items: center;
  margin: 3px 0;
  gap: 5px;
}
.align-row .al-icon { width: 14px; text-align: center; font-size: 11px; }
.align-row .al-name { width: 44px; color: var(--text-dim); font-size: 8px; }
.align-row .al-bar { flex: 1; height: 5px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; }
.align-row .al-fill { height: 100%; width: 0%; border-radius: 2px; transition: width 0.5s; }
.align-row .al-val { width: 22px; text-align: right; color: var(--gold); font-size: 8px; }

/* === STORY OVERLAY === */
#story-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(5, 5, 15, 0.92);
  z-index: 600;
  display: none;
  justify-content: center;
  align-items: center;
  backdrop-filter: blur(4px);
}
#story-overlay.show { display: flex; }

.story-box {
  background: var(--surface2);
  border: 1px solid rgba(255, 215, 0, 0.15);
  padding: 35px 45px;
  max-width: 560px;
  width: 90%;
  border-radius: 16px;
  text-align: center;
  box-shadow: 0 0 60px rgba(255, 215, 0, 0.05);
  animation: storyIn 0.6s ease-out;
}
@keyframes storyIn {
  0% { opacity: 0; transform: translateY(30px); }
  100% { opacity: 1; transform: translateY(0); }
}

.story-chapter {
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 3px;
  margin-bottom: 4px;
}
.story-title {
  font-size: 22px;
  color: var(--gold);
  font-weight: bold;
  letter-spacing: 3px;
  margin-bottom: 12px;
}
.story-text {
  font-size: 14px;
  color: var(--text);
  line-height: 1.8;
  margin-bottom: 16px;
  opacity: 0.9;
}
.story-choice {
  display: block;
  width: 100%;
  background: rgba(0, 212, 255, 0.05);
  border: 1px solid rgba(0, 212, 255, 0.15);
  color: var(--text);
  padding: 10px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 12px;
  margin-bottom: 6px;
  transition: all 0.3s;
  text-align: left;
}
.story-choice:hover {
  background: rgba(0, 212, 255, 0.1);
  border-color: var(--cyan);
  transform: translateX(4px);
}
.story-close {
  display: inline-block;
  margin-top: 8px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 8px 28px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 11px;
  letter-spacing: 2px;
  transition: all 0.3s;
}
.story-close:hover { border-color: var(--text); color: var(--text); }

/* Override cursor for aiming feel */
canvas { cursor: crosshair; }

/* === COUNCIL OVERLAY === */
.council-overlay {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(5, 5, 15, 0.97);
  z-index: 1000;
  display: none;
  justify-content: center;
  align-items: center;
  overflow-y: auto;
}
.council-overlay.show { display: flex; }
.council-box {
  background: radial-gradient(ellipse at center, #0d0620, #05050f);
  border: 1px solid rgba(255, 215, 0, 0.2);
  padding: 28px 40px;
  max-width: 620px;
  width: 90%;
  text-align: center;
  border-radius: 16px;
  box-shadow: 0 0 80px rgba(255, 215, 0, 0.06);
}
.council-title {
  font-size: 28px;
  font-weight: 900;
  background: linear-gradient(90deg, var(--gold), var(--cyan), var(--pink), var(--gold));
  background-size: 400% 100%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: titleFlow 5s linear infinite;
  letter-spacing: 6px;
  margin-bottom: 4px;
}
.council-subtitle { color: var(--text-dim); font-size: 11px; letter-spacing: 3px; margin-bottom: 16px; }
.council-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-bottom: 16px;
}
.council-card {
  background: rgba(8, 12, 25, 0.9);
  border: 1px solid var(--c, rgba(255,255,255,0.06));
  padding: 10px 14px;
  border-radius: 8px;
  text-align: left;
}
.council-card .cc-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
.council-card .cc-name { font-size: 12px; font-weight: bold; color: var(--c); }
.council-card .cc-score { font-size: 18px; color: var(--gold); font-weight: bold; }
.council-card .cc-verd { font-size: 9px; color: var(--text-dim); }
.council-total { font-size: 24px; color: var(--gold); font-weight: bold; letter-spacing: 3px; margin-bottom: 10px; }
.council-desc { font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
.council-btn {
  background: transparent;
  border: 1px solid var(--gold);
  color: var(--gold);
  padding: 10px 32px;
  font-size: 14px;
  cursor: pointer;
  letter-spacing: 3px;
  transition: all 0.3s;
  margin: 4px;
  border-radius: 8px;
}
.council-btn:hover { background: rgba(255, 215, 0, 0.08); box-shadow: 0 0 20px rgba(255, 215, 0, 0.1); }
.council-btn.sec { border-color: var(--text-dim); color: var(--text-dim); font-size: 11px; }
.council-btn.sec:hover { border-color: var(--text); color: var(--text); }

/* === LEADERBOARD === */
.leaderboard-overlay {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(5, 5, 15, 0.95);
  z-index: 1001;
  display: none;
  justify-content: center;
  align-items: center;
}
.leaderboard-overlay.show { display: flex; }
.leaderboard-box {
  background: var(--surface2);
  border: 1px solid rgba(0, 212, 255, 0.15);
  padding: 22px 30px;
  max-width: 480px;
  width: 90%;
  border-radius: 14px;
  box-shadow: 0 0 50px rgba(0, 212, 255, 0.04);
  max-height: 75vh;
  overflow-y: auto;
}
.leaderboard-box h2 { color: var(--gold); font-size: 20px; letter-spacing: 5px; margin-bottom: 12px; text-align: center; }
.lb-entry {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 10px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  font-size: 11px;
}
.lb-entry:last-child { border-bottom: none; }
.lb-entry .lb-r { color: var(--gold); font-weight: bold; width: 28px; }
.lb-entry .lb-s { color: var(--cyan); font-weight: bold; }
.lb-entry .lb-d { color: var(--text-dim); font-size: 9px; }
.lb-entry.top1 { background: rgba(255, 215, 0, 0.04); }
.lb-entry.top2 { background: rgba(192, 192, 192, 0.03); }
.lb-entry.top3 { background: rgba(205, 127, 50, 0.03); }
.lb-empty { color: var(--text-dim); text-align: center; padding: 16px; font-size: 12px; }
.lb-close-btn {
  display: block;
  margin: 12px auto 0;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 6px 24px;
  cursor: pointer;
  font-size: 11px;
  letter-spacing: 2px;
  border-radius: 6px;
}
.lb-close-btn:hover { border-color: var(--cyan); color: var(--cyan); }

/* === ASCENT MODE === */
.ascent-section {
  margin-top: 6px;
  border-top: 1px solid rgba(255,255,255,0.04);
  padding-top: 10px;
}
.ascent-title { color: var(--purple); font-size: 10px; letter-spacing: 2px; margin-bottom: 8px; }
.ascent-grid {
  display: flex;
  gap: 6px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 8px;
}
.ascent-btn {
  background: rgba(0, 0, 0, 0.4);
  border: 1px solid rgba(255,255,255,0.06);
  padding: 8px 12px;
  cursor: pointer;
  transition: all 0.3s;
  min-width: 60px;
  border-radius: 8px;
  text-align: center;
}
.ascent-btn:hover {
  border-color: var(--purple);
  background: rgba(136, 0, 255, 0.06);
  transform: translateY(-2px);
}
.ascent-btn.selected {
  border-color: var(--purple);
  background: rgba(136, 0, 255, 0.1);
}
.ascent-btn .ai-icon { font-size: 18px; display: block; }
.ascent-btn .ai-name { font-size: 9px; color: var(--purple); display: block; margin-top: 2px; font-weight: bold; }
.ascent-btn .ai-bonus { font-size: 7px; color: var(--text-dim); display: block; }
#ascent-info { font-size: 9px; color: var(--text-dim); line-height: 1.5; min-height: 30px; }

/* === FLOATING MSG === */
.floating-msg {
  position: fixed;
  top: 35%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 32px;
  color: #fff;
  text-shadow: 0 0 30px var(--cyan), 0 0 60px var(--pink), 0 0 90px var(--purple);
  z-index: 600;
  pointer-events: none;
  opacity: 0;
  animation: msgAnim 3.5s ease-in-out;
  text-align: center;
  font-weight: bold;
  line-height: 1.4;
}
@keyframes msgAnim {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
  12% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
  20% { transform: translate(-50%, -50%) scale(1); }
  80% { opacity: 1; }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
}

/* === TOAST === */
#toast-container { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); z-index: 300; display: flex; flex-direction: column; gap: 4px; pointer-events: none; }
.toast {
  background: rgba(0,0,0,0.8); color: #fff; padding: 6px 16px; border-radius: 8px;
  font-size: 11px; text-align: center; white-space: nowrap;
  animation: toastIn 0.3s ease-out;
  border: 1px solid rgba(255,255,255,0.1);
}
@keyframes toastIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

/* === PLAYER HP === */
#player-hp-wrap {
  position: fixed; bottom: 38px; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 8px;
  background: rgba(0,0,0,0.5); padding: 4px 12px; border-radius: 12px;
  z-index: 20; font-size: 11px;
}
#player-hp-label { color: #ff4444; font-weight: bold; }
#player-hp-track { width: 100px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }

<script>
// === STARFIELD ===
const starCanvas = document.getElementById('starfield');
const starCtx = starCanvas.getContext('2d');
starCanvas.width = window.innerWidth;
starCanvas.height = window.innerHeight;

let bgStars = [];
for(let i = 0; i < 250; i++) {
  bgStars.push({ x: Math.random() * starCanvas.width, y: Math.random() * starCanvas.height, size: Math.random() * 1.8, twinkle: Math.random() * Math.PI * 2, speed: 0.3 + Math.random() * 1.2, color: Math.random() > 0.85 ? 50 : 200 });
}

function animateStars() {
  starCtx.fillStyle = '#000003';
  starCtx.fillRect(0, 0, starCanvas.width, starCanvas.height);
  
  bgStars.forEach(s => {
    s.twinkle += 0.015 * s.speed;
    const alpha = 0.15 + Math.sin(s.twinkle) * 0.2;
    starCtx.fillStyle = `hsla(${s.color},70%,80%,${alpha})`;
    starCtx.beginPath();
    starCtx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    starCtx.fill();
  });
  requestAnimationFrame(animateStars);
}
animateStars();

// === GAME CANVAS ===
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
  starCanvas.width = window.innerWidth;
  starCanvas.height = window.innerHeight;
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

  quantum: { name: 'Quantum', phases: ['Probability Cloud','Wave Function','Entangled Pair','Quantum Tunnel','Superposition','Decoherence','Observation Mind','Probability Entity','Multiverse Walker','Quantum God','Universal Wave','Cosmic Probability','33° Mystic'], color: '#8800ff', clickBonus: 20, desc: 'Probability' },
  cosmic: { name: 'Cosmic', phases: ['Stardust','Nebula Seed','Solar Child','Planet Walker','Star Singer','Galaxy Dancer','Void Walker','Dimension Weaver','Cosmic Mind','Eternal Flame','Universal Soul','First Cause','33° Celestial'], color: '#ff00ff', clickBonus: 22, desc: 'Star-born' },
  void: { name: 'Void', phases: ['Nothing','Absence','The Vast','No-Thing','Empty Space','Null Point','Void Mind','Abyss Walker','No-Return','Universal None','Non-Existence','The Source','33° Nothing'], color: '#444444', clickBonus: 25, desc: 'The nothing' }
};

const COSTS = [0,12,30,70,180,350,600,1000,1500,2300,3400,5000,7500];
const MOON = ['🌑','🌒','🌓','🌔','🌕','🌖','🌗','🌘'];
const MOON_BONUS = [1, 1.1, 1.2, 1.3, 1.5, 1.3, 1.2, 1.1];

// === STATE ===
let game = {
  essence: 0, biomass: 0, quantum: 0, photons: 0, voidEssence: 0,
  phase: 0, path: 'primordial', clickPower: 1, autoRate: 0,
  launched: false, intergalactic: false, day: 1, entanglement: 0,
  meditation: 0, harmony: 0,
  ascentAgent: null, councilDone: false, councilScore: 0,
  alignment: { shaddai: 0, zerox: 0, oracle: 0, nexus: 0, turtle: 0, quill: 0, pikadon: 0 },
  score: 0,
  // Life Sim needs
  needs: { hunger: 100, energy: 100, social: 100, fun: 100 },
  // Inventory
  inventory: { essenceCrystals: 0, quantumShards: 0, voidResidue: 0, cosmicDust: 0, starlight: 0 },
  needs: { hunger: 100, energy: 100, social: 100, fun: 100 },
  structures: [],
  buildMode: false,
  // Tower defense
  tdWave: 0, tdActive: false, tdEnemies: [], tdCooldown: 0, tdTimer: 0,

  // NPCs
  npcs: [],
  // Events
  currentEvent: null, eventTimer: 0,
  // Resources for building
  resources: { wood: 0, stone: 0, crystal: 0, essenceShard: 0 }
};

let player = { x: 0, y: 0, size: 35, pulse: 0, vx: 0, vy: 0, angle: 0, hp: 100, maxHp: 100, targetX: null, targetY: null };
let entities = [];
let particles = [];
let stars = [];
let floatingTexts = [];
let projectiles = [];
let running = false;
let cam = { x: 0, y: 0 };

// Stars
for(let i = 0; i < 350; i++) {
  stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 1.3, twinkle: Math.random() * 6.28 });
}

function randomInZone(entityType) {
  const zones = WORLD_ZONES.filter(z => z.entities.includes(entityType));
  if (zones.length === 0) return { x: Math.random() * WORLD_W, y: Math.random() * WORLD_H };
  const z = zones[Math.floor(Math.random() * zones.length)];
  return { x: z.x + Math.random() * z.w, y: z.y + Math.random() * z.h };
}

function spawnEntities() {
  entities = [];
  for(let i = 0; i < 15; i++) {
    const pos = randomInZone('amoeba');
    entities.push({ type: 'amoeba', x: pos.x, y: pos.y, size: 10 + Math.random() * 14, vx: (Math.random() - 0.5) * 0.9, vy: (Math.random() - 0.5) * 0.9, hue: 100 + Math.random() * 80, pulse: Math.random() * 6.28, wobble: Math.random() * 6.28 });
  }
  for(let i = 0; i < 30; i++) {
    const pos = randomInZone('nutrient');
    entities.push({ type: 'nutrient', x: pos.x, y: pos.y, size: 1.5 + Math.random() * 2.5, hue: 40 + Math.random() * 30, pulse: Math.random() * 6.28 });

    const pos = randomInZone('crystal');

  }
}
spawnEntities();

// === START ===
function startGame() {
  game.phase = 0;
  game.essence = 0;
  game.biomass = 0;
  game.quantum = 0;
  game.photons = 0;
  game.voidEssence = 0;
  game.clickPower = PATHS[game.path].clickBonus / 15;
  game.autoRate = 0;
  game.launched = false;
  game.intergalactic = false;
  game.day = 1;
  game.entanglement = 0;
  game.meditation = 0;
  game.harmony = 0;
  game.needs = { hunger: 100, energy: 100, social: 100, fun: 100 };
  game.resources = { wood: 0, stone: 0, crystal: 0, essenceShard: 0, voidResidue: 0 };
  game.structures = [];
  game.npcs = [];
  game.tdWave = 0;
  game.tdActive = false;
  game.tdEnemies = [];
  game.tdCooldown = 0;
  game.tdTimer = 0;
  game.arena = { active: false, agent: null, playerHP: 100, enemyHP: 100, phase: 'waiting' };
  game.currentEvent = null;
  game.eventTimer = 0;
  game.buildMode = false;
  
  player.x = WORLD_W / 2;
  player.y = WORLD_H / 2;
  player.size = 35;
  player.vx = 0;
  player.vy = 0;
  player.hp = 100;
  player.maxHp = 100;
  player.targetX = null;
  player.targetY = null;
  cam.x = 0;
  cam.y = 0;
  
  particles = [];
  floatingTexts = [];
  spawnEntities();
  spawnResourceNodes();
  spawnNPCs();
  
  document.getElementById('menu').classList.add('hidden');
  document.getElementById('build-panel').classList.remove('show');
  document.getElementById('arena-overlay').classList.remove('show');
  document.getElementById('td-hud').classList.remove('show');
  running = true;
  gameLoop();
  
  addLog('═══════════════════════════');
  addLog('✦ THE ASCENSION BEGINS ✦');
  addLog('═══════════════════════════');
  addLog('▶ Fly to collect orbs');
  addLog('▶ Click to move or interact');
  addLog('▶ Evolve through 13 stages');
  addLog('▶ Explore the world!');
  updateStats();
}

// === CONTINUE ===
function continueGame() {
  if (!loadGame()) { showToast('No save found!'); return; }
  player.x = player.x || WORLD_W / 2;
  player.y = player.y || WORLD_H / 2;
  cam.x = 0; cam.y = 0;
  particles = []; floatingTexts = [];
  spawnEntities(); spawnResourceNodes(); spawnNPCs();
  document.getElementById('menu').classList.add('hidden');
  running = true;
  gameLoop();
  addLog('═══════════════════════════');
  addLog('↻ CONTINUED SESSION');
  addLog('═══════════════════════════');
  updateStats();
}

// Check for save on load
document.addEventListener('DOMContentLoaded', () => {
  if (localStorage.getItem(SAVE_KEY)) {
    const btn = document.getElementById('continueBtn');
    if (btn) { btn.style.display = 'inline-block'; }
    const ind = document.getElementById('saveIndicator');
    if (ind) { ind.textContent = 'Save found — click to clear'; }
  }
});
function addLog(text) {
  const log = document.getElementById('logs');
  const div = document.createElement('div');
  div.textContent = text;
  log.prepend(div);
  if (log.children.length > 12) log.lastChild.remove();
}

function showMessage(text) {
  const msg = document.createElement('div');
  msg.className = 'floating-msg';
  msg.textContent = text;
  document.body.appendChild(msg);
  setTimeout(() => msg.remove(), 3500);
}

function formatNum(n) {
  if (n >= 1e9) return (n/1e9).toFixed(2) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(2) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return Math.floor(n);
}

// === SAVE / LOAD ===
const SAVE_KEY = 'apophenoth_save';

function saveGame() {
  try {
    const data = {
      phase: game.phase, essence: game.essence, biomass: game.biomass,
      quantum: game.quantum, photons: game.photons, voidEssence: game.voidEssence,
      path: game.path, day: game.day, entanglement: game.entanglement,
      meditation: game.meditation, harmony: game.harmony,
      alignment: game.alignment, needs: game.needs,
      resources: game.resources, structures: game.structures.slice(0, 20),
      tdWave: game.tdWave, score: game.score,
      launched: game.launched, intergalactic: game.intergalactic,
      autoRate: game.autoRate,
      playerX: player.x, playerY: player.y, playerSize: player.size,
      playerHp: player.hp, playerMaxHp: player.maxHp
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  } catch (e) {}
}

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    Object.assign(game, data);
    if (data.playerX) { player.x = data.playerX; player.y = data.playerY; }
    if (data.playerSize) player.size = data.playerSize;
    if (data.playerHp) { player.hp = data.playerHp; player.maxHp = data.playerMaxHp || 100; }
    return true;
  } catch (e) { return false; }
}

function clearSave() {
  localStorage.removeItem(SAVE_KEY);
}

// === UPDATE ===
function updateStats() {
  const pathData = PATHS[game.path];
  const moonIdx = Math.floor((game.day % 28) / 28 * 8) % 8;
  const moonBonus = MOON_BONUS[moonIdx];
  
  document.getElementById('hud-essence').textContent = formatNum(game.essence);
  document.getElementById('hud-biomass').textContent = formatNum(game.biomass);
  document.getElementById('hud-quantum').textContent = formatNum(game.quantum);
  document.getElementById('hud-photons').textContent = formatNum(game.photons);
  document.getElementById('hud-void').textContent = formatNum(game.voidEssence);
  
  const phases = pathData.phases;
  const current = phases[Math.min(game.phase, phases.length - 1)];
  document.getElementById('phase-display').textContent = current;
  document.getElementById('phase-progress').style.width = ((game.phase + 1) / phases.length * 100) + '%';
  
  document.getElementById('moon-icon-hud').textContent = MOON[moonIdx];
  document.getElementById('day-text-hud').textContent = 'Day ' + Math.floor(game.day);
  document.getElementById('entangle-hud').textContent = '⟨E⟩ ' + Math.floor(game.entanglement) + '%';
  
  document.getElementById('hud-clickPwr').textContent = '+' + Math.floor(pathData.clickBonus * (1 + game.meditation * 0.1));
  document.getElementById('hud-auto').textContent = '+' + game.autoRate.toFixed(1) + '/s';
  document.getElementById('hud-moon').textContent = moonBonus + 'x';
  
  // Life sim needs
  document.getElementById('needs-hunger').style.width = game.needs.hunger + '%';
  document.getElementById('needs-energy').style.width = game.needs.energy + '%';
  document.getElementById('needs-social').style.width = game.needs.social + '%';
  document.getElementById('needs-fun').style.width = game.needs.fun + '%';
  
  // Resources
  document.getElementById('res-crystal').textContent = game.resources.crystal;
  document.getElementById('res-void').textContent = game.resources.voidResidue;
  document.getElementById('res-shard').textContent = game.resources.essenceShard;
  
  // HP
  const hpPct = Math.max(0, player.hp / player.maxHp * 100);
  document.getElementById('player-hp-bar').style.width = hpPct + '%';
  document.getElementById('player-hp-text').textContent = Math.floor(player.hp) + '/' + player.maxHp;
  
  // Buttons
  const cost = COSTS[Math.min(game.phase + 1, COSTS.length - 1)];
  const btn = document.getElementById('evolveBtn');
  if (game.phase < phases.length - 1) {
    btn.textContent = 'Evolve (' + formatNum(cost) + ')';
    btn.disabled = game.essence < cost;
  } else {
    btn.textContent = '✦ 33° ASCENDED ✦';
    btn.disabled = true;
  }
  
  document.getElementById('launchBtn').disabled = game.phase < 7;
  document.getElementById('transmitBtn').disabled = !game.launched;
  document.getElementById('growBtn').disabled = game.path !== 'plant';
  document.getElementById('collapseBtn').disabled = game.path !== 'quantum' || game.quantum < 80;
  document.getElementById('starBtn').disabled = game.path !== 'cosmic';
  document.getElementById('devourBtn').disabled = game.path !== 'void' || entities.length < 3;
}

// === ACTIONS ===
function getMoonBonus() {
  const moonIdx = Math.floor((game.day % 28) / 28 * 8) % 8;
  return MOON_BONUS[moonIdx];
}

function clickEssence(e) {
  if (!running) return;
  
  const pathData = PATHS[game.path];
  const moonBonus = getMoonBonus();
  const power = 1 + game.meditation * 0.1 + game.harmony * 0.05;
  const amt = Math.floor(pathData.clickBonus * moonBonus * power * game.clickPower);
  
  game.essence += amt;
  game.biomass += amt * 0.18;
  game.quantum += amt * 0.015;
  if (game.path === 'void') game.voidEssence += amt * 0.1;
  
  for(let i = 0; i < 10; i++) {
    particles.push({
      x: e.clientX, y: e.clientY,
      vx: (Math.random() - 0.5) * 10,
      vy: (Math.random() - 0.5) * 10,
      size: 1.5 + Math.random() * 2.5,
      life: 1,
      color: [pathData.color,'#ff00ff','#ffd700','#8800ff'][Math.floor(Math.random() * 4)]
    });
  }
  
  floatingTexts.push({ x: e.clientX, y: e.clientY, text: '+' + formatNum(amt), color: pathData.color, life: 1, vy: -2.5 });
  
  // Random essence message
  if (Math.random() < 0.05) {
    const msgs = ['Essence flows...','You expand...','Form crystallizes...','Consciousness grows...','The void sees you...'];
    addLog(msgs[Math.floor(Math.random() * msgs.length)]);
  }
  
  updateStats();
}

function evolve() {
  const pathData = PATHS[game.path];
  const phases = pathData.phases;
  const cost = COSTS[Math.min(game.phase + 1, COSTS.length - 1)];
  
  if (game.phase < phases.length - 1 && game.essence >= cost) {
    game.essence -= cost;
    game.phase++;
    game.clickPower *= 1.7;
    game.autoRate += 2;
    player.size = 35 + game.phase * 5;
    game.entanglement = Math.min(100, game.entanglement + 4);
    game.meditation = Math.max(0, game.meditation - 5);
    game.harmony = Math.max(0, game.harmony - 3);
    
    showMessage('⚡ ' + phases[game.phase].toUpperCase() + ' ⚡');
    addLog('▶ ' + phases[game.phase]);
    
    for(let i = 0; i < 40; i++) {
      particles.push({ x: player.x, y: player.y, vx: (Math.random() - 0.5) * 14, vy: (Math.random() - 0.5) * 14, size: 2.5, life: 1.2, color: pathData.color });
    }
    
    if (game.phase === 6) addLog('🧠 BRAIN IN THE VAT');
    if (game.phase === 12) {
      addLog('═══════════════════════════');
      addLog('⚡⚡⚡ 33° DEGREE ACHIEVED! ⚡⚡⚡');
      addLog('You have transcended form.');
      addLog('The cosmos await your will.');
      addLog('═══════════════════════════');
    }
    updateStats();
  }
}

function absorb() {
  const targets = entities.filter(e => e.type === 'amoeba');
  if (targets.length > 0) {
    const t = targets[Math.floor(Math.random() * targets.length)];
    const amt = Math.floor(t.size * 2.5);
    game.essence += amt;
    game.biomass += amt * 0.25;
    entities = entities.filter(e => e !== t);
    
    for(let i = 0; i < 12; i++) {
      particles.push({ x: player.x, y: player.y, vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6, size: 2, life: 0.9, color: '#ff00ff' });
    }
    floatingTexts.push({ x: player.x, y: player.y - 25, text: '+' + amt, color: '#ff00ff', life: 0.9, vy: -2.5 });
    addLog('✦ +' + amt + ' Essence');
    updateStats();
  } else {
    addLog('No amoebas! Click to create more.');
  }
}

function grow() {
  if (game.path !== 'plant') { addLog('Select Plant path first!'); return; }
  const bonus = 45 + game.phase * 22 + game.harmony * 10;
  game.essence += bonus;
  game.biomass += bonus * 1.2;
  addLog('🌿 +' + bonus + ' Essence (Photosynthesis)');
  showMessage('🌿 PHOTOSYNTHESIS 🌿');
  for(let i = 0; i < 20; i++) {
    particles.push({ x: player.x + (Math.random() - 0.5) * 60, y: player.y + (Math.random() - 0.5) * 40, vx: (Math.random() - 0.5) * 3, vy: -2 - Math.random() * 2, size: 2.5, life: 1, color: '#228B22' });
  }
  floatingTexts.push({ x: player.x, y: player.y - 40, text: '+' + bonus, color: '#228B22', life: 1.2, vy: -2.5 });
  updateStats();
}

function collapse() {
  if (game.path !== 'quantum' || game.quantum < 80) { addLog('Need 80 Quantum!'); return; }
  game.quantum -= 80;
  game.entanglement = Math.min(100, game.entanglement + 20);
  const bonus = 350 + game.entanglement * 3;
  game.essence += bonus;
  game.quantum += 30;
  addLog('⚛ WAVEFORM COLLAPSED! +' + bonus);
  showMessage('⚛ QUANTUM REALITY SHIFT ⚛');
  for(let i = 0; i < 35; i++) {
    const a = Math.random() * Math.PI * 2;
    const d = 25 + Math.random() * 60;
    particles.push({ x: player.x + Math.cos(a) * d, y: player.y + Math.sin(a) * d, vx: -Math.cos(a) * 5, vy: -Math.sin(a) * 5, size: 3.5, life: 1.2, color: '#8800ff' });
  }
  updateStats();
}

function absorbStar() {
  if (game.path !== 'cosmic') { addLog('Select Cosmic path first!'); return; }
  const bonus = 70 + game.phase * 45 + game.harmony * 15;
  game.essence += bonus;
  game.photons += bonus * 0.12;
  game.entanglement += 5;
  addLog('☀ +' + bonus + ' Essence (Stellar energy)');
  showMessage('☀ SUPERNOVA POWER ☀');
  for(let i = 0; i < 25; i++) {
    particles.push({ x: player.x + (Math.random() - 0.5) * 60, y: player.y + (Math.random() - 0.5) * 60, vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6, size: 3, life: 0.9, color: '#ffd700' });
  }
  floatingTexts.push({ x: player.x, y: player.y - 45, text: '+' + bonus, color: '#ffd700', life: 1, vy: -2.5 });
  updateStats();
}

function meditate() {
  const bonus = 25 + game.phase * 8;
  game.essence += bonus;
  game.meditation = Math.min(50, game.meditation + 5);
  addLog('🧘 +' + bonus + ' Essence (Meditation)');
  showMessage('🧘 INNER PEACE 🧘');
  for(let i = 0; i < 15; i++) {
    const angle = (i / 15) * Math.PI * 2;
    particles.push({ x: player.x + Math.cos(angle) * 40, y: player.y + Math.sin(angle) * 40, vx: -Math.cos(angle) * 2, vy: -Math.sin(angle) * 2, size: 2, life: 2, color: '#00ffcc' });
  }
  updateStats();
}

function harmonize() {
  const bonus = 40 + game.entanglement * 2;
  game.essence += bonus;
  game.harmony = Math.min(30, game.harmony + 4);
  game.entanglement = Math.min(100, game.entanglement + 3);
  addLog('🔮 +' + bonus + ' Essence (Harmony)');
  showMessage('🔮 UNIVERSAL HARMONY 🔮');
  for(let i = 0; i < 20; i++) {
    particles.push({ x: player.x + (Math.random() - 0.5) * 80, y: player.y + (Math.random() - 0.5) * 80, vx: (Math.random() - 0.5) * 4, vy: (Math.random() - 0.5) * 4, size: 2.5, life: 1.5, color: '#ff00ff' });
  }
  updateStats();
}

function devour() {
  if (game.path !== 'void' || entities.length < 3) { addLog('Nothing to devour!'); return; }
  const targets = entities.slice(0, 3);
  let total = 0;
  targets.forEach(t => {
    total += Math.floor(t.size * 3);
    game.voidEssence += t.size;
  });
  game.essence += total;
  game.entanglement = Math.min(100, game.entanglement + 8);
  entities = entities.slice(3);
  
  addLog('◈ DEVOURED +' + total + ' Essence');
  showMessage('◈ THE VOID CONSUMES ◈');
  for(let i = 0; i < 30; i++) {
    particles.push({ x: player.x, y: player.y, vx: (Math.random() - 0.5) * 15, vy: (Math.random() - 0.5) * 15, size: 4, life: 1.5, color: '#444444' });
  }
  floatingTexts.push({ x: player.x, y: player.y - 50, text: '+' + total, color: '#888888', life: 1.5, vy: -3 });
  updateStats();
}

function launch() {
  if (game.phase >= 7 && !game.launched) {
    game.launched = true;
    game.entanglement = 40;
    addLog('🚀 BRAIN LAUNCHED INTO SPACE!');
    addLog('📡 Converting to pure signal...');
    showMessage('🌌 ENTERING THE COSMIC VOID 🌌');
    for(let i = 0; i < 80; i++) {
      particles.push({ x: canvas.width/2, y: canvas.height/2, vx: (Math.random() - 0.5) * 25, vy: (Math.random() - 0.5) * 25, size: 3.5, life: 2, color: '#00ffcc' });
    }
    updateStats();
  }
}

function transmit() {
  if (game.launched && game.photons < 1000000) {
    const base = 350 + game.quantum + game.entanglement * 5;
    const bonus = getMoonBonus();
    const amt = Math.floor(base * bonus);
    game.photons += amt;
    
    const msgs = ['📡 Orion Arm receives signal...','🌟 Andromeda decodes transmission...','👽 Alien civilization responds...','🔮 Multiverse acknowledges presence...','⚖️ Galactic Federation records entry...','🌌 Your signal spreads across cosmos...'];
    addLog(msgs[Math.floor(Math.random() * msgs.length)]);
    
    if (game.photons > 50000 && !game.intergalactic) {
      game.intergalactic = true;
      game.entanglement = 100;
      addLog('═══════════════════════════');
      addLog('⚡🌌 INTERGALACTIC FEDERATION');
      addLog('⚡ Your cosmic mayhem begins!');
      addLog('═══════════════════════════');
      showMessage('⚡⚡ LIGHTHEARTED MAYHEM ⚡⚡');
    }
    updateStats();
  }
}

// === CONTROLS ===
let keys = {};
let konamiIdx = 0;
const KONAMI = ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'];

window.addEventListener('keydown', e => {
  keys[e.key] = true;
  
  // Konami code
  if (running && e.key === KONAMI[konamiIdx]) {
    konamiIdx++;
    if (konamiIdx >= KONAMI.length) { skipEvolve(); konamiIdx = 0; }
  } else { konamiIdx = 0; }
  
  // Ability shortcuts
  if (running && e.code === 'Space') {
    e.preventDefault();
    useAbility();
  }
  if (running && e.key.toLowerCase() === 'e') evolve();
  if (running && e.key.toLowerCase() === 'a') absorb();
  if (running && e.key.toLowerCase() === 'g') grow();
  if (running && e.key.toLowerCase() === 'c') collapse();
  if (running && e.key.toLowerCase() === 's') absorbStar();
  if (running && e.key.toLowerCase() === 'm') meditate();
  if (running && e.key.toLowerCase() === 'h') harmonize();
  if (running && e.key.toLowerCase() === 'd') devour();
  if (running && e.key.toLowerCase() === 'l') launch();
  if (running && e.key.toLowerCase() === 't') transmit();
  if (running && e.key.toLowerCase() === 'b') toggleBuildMode();
  if (e.key === 'Escape') {
    if (game.buildMode) toggleBuildMode();
    if (game.arena.active) closeArena();
  }
});

window.addEventListener('keyup', e => keys[e.key] = false);

function useAbility() {
  switch(game.path) {
    case 'plant': grow(); break;
    case 'quantum': collapse(); break;
    case 'cosmic': absorbStar(); break;
    case 'void': devour(); break;
    default: meditate();
  }
}

function skipEvolve() {
  const pathData = PATHS[game.path];
  const phases = pathData.phases;
  if (game.phase < phases.length - 1) {
    game.phase++;
    game.essence += 20000;
    game.clickPower = 40;
    game.entanglement = Math.min(100, game.entanglement + 8);
    showMessage('⚡ ASCENSION ⚡');
    addLog('→ ' + phases[game.phase]);
    if (game.phase >= 7) game.launched = true;
    if (game.phase === 12) {
      setTimeout(triggerCouncil, 1500);
    }
    updateStats();
  }
}

// === GAME LOOP ===
function gameLoop() {
  if (!running) return;
  
  ctx.clearRect(-20, -20, canvas.width + 40, canvas.height + 40);
  ctx.fillStyle = 'rgba(0, 0, 8, 0.4)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  const pathData = PATHS[game.path];
  
  // Stars (screen space, background)
  stars.forEach(s => {
    s.twinkle += 0.045;
    const alpha = 0.12 + Math.sin(s.twinkle) * 0.12;
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
  });
  
  // Physics-based movement
  const accel = 0.45;
  const drag = 0.88;
  const maxSpeed = 4 + game.phase * 0.2;
  let mx = 0, my = 0;
  if (keys['w'] || keys['ArrowUp']) my -= 1;
  if (keys['s'] || keys['ArrowDown']) my += 1;
  if (keys['a'] || keys['ArrowLeft']) mx -= 1;
  if (keys['d'] || keys['ArrowRight']) mx += 1;
  if (player.targetX !== null && Math.hypot(player.targetX - player.x, player.targetY - player.y) > 10) {
    const a = Math.atan2(player.targetY - player.y, player.targetX - player.x);
    mx += Math.cos(a); my += Math.sin(a);
  } else { player.targetX = null; player.targetY = null; }
  if (mx !== 0 || my !== 0) {
    const len = Math.hypot(mx, my);
    player.vx += (mx / len) * accel;
    player.vy += (my / len) * accel;
  }
  player.vx *= drag;
  player.vy *= drag;
  const spd = Math.hypot(player.vx, player.vy);
  if (spd > maxSpeed) { player.vx = (player.vx / spd) * maxSpeed; player.vy = (player.vy / spd) * maxSpeed; }
  player.x += player.vx;
  player.y += player.vy;
  worldBounds();
  
  // Camera follows player (centered)
  cam.x += (player.x - canvas.width / 2 - cam.x) * 0.08;
  cam.y += (player.y - canvas.height / 2 - cam.y) * 0.08;
  
  // Player angle toward mouse in world
  player.angle = Math.atan2(mouseWorldY - player.y, mouseWorldX - player.x);
  
  // Movement trail
  if (Math.hypot(player.vx, player.vy) > 0.5) {
    for (let i = 0; i < 2; i++) {
      particles.push({
        x: player.x + (Math.random() - 0.5) * 15,
        y: player.y + (Math.random() - 0.5) * 15,
        vx: -player.vx * 0.1 + (Math.random() - 0.5) * 0.5,
        vy: -player.vy * 0.1 + (Math.random() - 0.5) * 0.5,
        size: 1.5 + Math.random() * 1.5,
        life: 0.6 + Math.random() * 0.3,
        color: PATHS[game.path].color
      });
    }
  }
  
  // Spawn entities in world (zone-aware)
  if (Math.random() < 0.02 + game.phase * 0.002) {
    const pos = randomInZone('amoeba');
    entities.push({ type: 'amoeba', x: pos.x, y: pos.y, size: 10 + Math.random() * 14, vx: (Math.random() - 0.5) * 0.9, vy: (Math.random() - 0.5) * 0.9, hue: 100 + Math.random() * 80, pulse: Math.random() * 6.28, wobble: Math.random() * 6.28 });
  }
  if (Math.random() < 0.06 + game.phase * 0.005) {
    const pos = randomInZone('nutrient');
    entities.push({ type: 'nutrient', x: pos.x, y: pos.y, size: 1.5 + Math.random() * 2.5, hue: 40 + Math.random() * 30, pulse: Math.random() * 6.28 });
  }
  if (Math.random() < 0.005 + game.phase * 0.002 && game.phase >= 3) {
    const pos = randomInZone('crystal');
    entities.push({ type: 'crystal', x: pos.x, y: pos.y, size: 4 + Math.random() * 4, hue: 280 + Math.random() * 40, pulse: Math.random() * 6.28 });
  }

  // Render all world layers (zones, entities, structures, TD, NPCs, resource nodes, auto-collect)
  renderWorld(ctx);

  // Player character
  player.pulse += 0.045;
  character.eyeTarget.x += (mouseWorldX - character.eyeTarget.x) * 0.08;
  character.eyeTarget.y += (mouseWorldY - character.eyeTarget.y) * 0.08;
  
  ctx.save();
  ctx.translate(-cam.x, -cam.y);
  renderCharacter(ctx, player.x, player.y, player.size, game.path, game.phase, player.pulse, character.eyeTarget.x, character.eyeTarget.y, pathData.color);
  ctx.restore();

  // Particles (world coords, rendered relative to camera)
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy;
    p.life -= 0.018;
    if (p.life > 0) {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 7;
      ctx.beginPath();
      ctx.arc(p.x - cam.x, p.y - cam.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
      return true;
    }
    return false;
  });

  // Floating text
  floatingTexts = floatingTexts.filter(t => {
    t.y += t.vy;
    t.life -= 0.018;
    if (t.life > 0) {
      ctx.globalAlpha = t.life;
      ctx.font = 'bold 12px Arial';
      ctx.fillStyle = t.color;
      ctx.fillText(t.text, t.x - cam.x, t.y - cam.y);
      ctx.globalAlpha = 1;
      return true;
    }
    return false;
  });
  
  // Tick life sim needs
  tickNeeds();
  
  // Tick tower defense
  tickTD();
  
  // Tick random events
  tickEvents();
  
  // Tick NPCs
  tickNPCs();
  
  // Tick structures (passive bonuses)
  tickBuildings();
  
  // Auto essence + decay
  game.essence += game.autoRate * 0.016;
  game.meditation = Math.max(0, game.meditation - 0.003);
  game.harmony = Math.max(0, game.harmony - 0.002);
  game.day += 0.008;
  
  // Auto-save every 300 frames (~5 seconds at 60fps)
  game._saveTimer = (game._saveTimer || 0) + 1;
  if (game._saveTimer >= 300) {
    game._saveTimer = 0;
    saveGame();
  }
  
  updateStats();
  
  requestAnimationFrame(gameLoop);
}

// === MOUSE TRACKING ===
let mouseX = 0, mouseY = 0;
let mouseWorldX = 0, mouseWorldY = 0;

document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; mouseWorldX = mouseX + cam.x; mouseWorldY = mouseY + cam.y; });

// === CAMERA SYSTEM ===
const WORLD_W = 3000, WORLD_H = 2000;
function worldBounds() { player.x = Math.max(45, Math.min(WORLD_W - 45, player.x)); player.y = Math.max(45, Math.min(WORLD_H - 45, player.y)); }

// === CLICK HANDLER ===
canvas.addEventListener('click', e => {
  if (!running) return;
  const wx = e.clientX + cam.x, wy = e.clientY + cam.y;
  // Try NPC interaction first
  if (interactNPC(wx, wy)) return;
  // Try structure upgrade
  if (interactStructure(wx, wy)) return;
  // Click to move toward
  player.targetX = wx;
  player.targetY = wy;
});

// === LIFE SIM NEEDS ===
function tickNeeds() {
  const n = game.needs;
  n.hunger = Math.max(0, n.hunger - 0.02 - game.phase * 0.005);
  n.energy = Math.max(0, n.energy - 0.03 - game.phase * 0.005);
  n.social = Math.max(0, n.social - 0.01);
  n.fun = Math.max(0, n.fun - 0.015);
  
  // Structure bonuses
  if (game.structures.some(s => s.type === 'essenceGeyser')) n.energy = Math.min(100, n.energy + 0.2);
  if (game.structures.some(s => s.type === 'meditationChamber')) n.fun = Math.min(100, n.fun + 0.15);
  if (game.structures.some(s => s.type === 'nexusHub')) n.social = Math.min(100, n.social + 0.1);
  
  // Penalties for low needs
  if (n.hunger <= 0) { game.essence = Math.max(0, game.essence - 0.3); }
  if (n.energy <= 0) { player.hp = Math.max(0, player.hp - 0.2); }
  if (n.social <= 0) { game.meditation = Math.max(0, game.meditation - 0.02); }
  if (n.fun <= 0) { game.harmony = Math.max(0, game.harmony - 0.02); }
}

// === RESOURCE NODES ===
let resourceNodes = [];
function spawnResourceNodes() {
  resourceNodes = [];
  for (let i = 0; i < 60; i++) {
    const types = ['essenceCrystal', 'quantumOre', 'voidShard', 'cosmicFlower', 'starlightPool'];
    const type = types[Math.floor(Math.random() * types.length)];
    resourceNodes.push({ type, x: 100 + Math.random() * (WORLD_W - 200), y: 100 + Math.random() * (WORLD_H - 200), amount: 10 + Math.floor(Math.random() * 30), pulse: Math.random() * 6.28 });
  }
}
spawnResourceNodes();

function collectResource(wx, wy) {
  for (let i = resourceNodes.length - 1; i >= 0; i--) {
    const r = resourceNodes[i];
    if (Math.hypot(wx - r.x, wy - r.y) < 25) {
      game.resources.essenceShard += Math.floor(r.amount * 0.3);
      game.resources.crystal += Math.floor(r.amount * 0.2);
      game.essence += Math.floor(r.amount * 0.5);
      floatingTexts.push({ x: r.x, y: r.y - 20, text: '+' + Math.floor(r.amount * 0.5), color: '#ffd700', life: 0.6, vy: -2 });
      for (let j = 0; j < 8; j++) particles.push({ x: r.x, y: r.y, vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6, size: 2, life: 0.5, color: '#ffd700' });
      resourceNodes.splice(i, 1);
      setTimeout(() => { if (running) resourceNodes.push({ type: r.type, x: 100 + Math.random() * (WORLD_W - 200), y: 100 + Math.random() * (WORLD_H - 200), amount: 10 + Math.floor(Math.random() * 30), pulse: 0 }); }, 30000);
      return true;
    }
  }
  return false;
}

// === NPC AGENTS ROAMING ===
function spawnNPCs() {
  game.npcs = [];
  const agentKeys = Object.keys(AGENTS);
  for (let i = 0; i < 7; i++) {
    const key = agentKeys[i];
    game.npcs.push({
      key, x: 200 + Math.random() * (WORLD_W - 400), y: 200 + Math.random() * (WORLD_H - 400),
      vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3,
      pulse: Math.random() * 6.28, dialog: 0, dialogTimer: 0
    });
  }
}

function tickNPCs() {
  game.npcs.forEach(n => {
    n.pulse += 0.03;
    n.x += n.vx; n.y += n.vy;
    if (n.x < 50 || n.x > WORLD_W - 50) n.vx *= -1;
    if (n.y < 50 || n.y > WORLD_H - 50) n.vy *= -1;
    if (n.dialogTimer > 0) n.dialogTimer--;
    // Proximity to player - trigger encounter
    if (Math.hypot(n.x - player.x, n.y - player.y) < 80 && n.dialogTimer === 0) {
      n.dialog = 1;
      n.dialogTimer = 180;
    }
  });
}

function renderNPC(ctx) {
  game.npcs.forEach(n => {
    if (n.x < cam.x - 50 || n.x > cam.x + canvas.width + 50 || n.y < cam.y - 50 || n.y > cam.y + canvas.height + 50) return;
    const agent = AGENTS[n.key];
    const alpha = 0.7 + Math.sin(n.pulse * 2) * 0.15;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.shadowColor = agent.color;
    ctx.shadowBlur = 15;
    ctx.font = '28px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(agent.icon, n.x - cam.x, n.y - cam.y + Math.sin(n.pulse) * 3);
    ctx.shadowBlur = 0;
    ctx.font = '8px Arial';
    ctx.fillStyle = agent.color;
    ctx.fillText(agent.name, n.x - cam.x, n.y - cam.y + 22);
    ctx.globalAlpha = 1;
    // Dialog bubble
    if (n.dialog > 0 && n.dialogTimer > 0) {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(n.x - cam.x - 30, n.y - cam.y - 40, 60, 20);
      ctx.fillStyle = agent.color;
      ctx.font = '7px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('✦ Interact ✦', n.x - cam.x, n.y - cam.y - 28);
      n.dialog = 0;
    }
    ctx.restore();
  });
}

function interactNPC(wx, wy) {
  for (const n of game.npcs) {
    if (Math.hypot(wx - n.x, wy - n.y) < 40) {
      const agent = AGENTS[n.key];
      const bonus = 10 + game.phase * 5;
      game.essence += bonus;
      addAlignment(n.key, 3);
      addLog('✦ Met ' + agent.name + '! +' + bonus + ' essence');
      showToast('✦ ' + agent.icon + ' ' + agent.name + ': ' + bonus + ' essence');
      for (let j = 0; j < 12; j++) particles.push({ x: n.x, y: n.y, vx: (Math.random() - 0.5) * 8, vy: (Math.random() - 0.5) * 8, size: 2, life: 0.8, color: agent.color });
      n.dialogTimer = 300;
      return true;
    }
  }
  return false;
}

// === STRUCTURES / BUILDING ===
const STRUCTURES = {
  essenceGeyser: { name: 'Essence Geyser', icon: '⛲', cost: { essence: 200 }, desc: '+0.5 essence/s, +energy' },
  meditationChamber: { name: 'Meditation Chamber', icon: '🕉', cost: { essence: 150, crystal: 5 }, desc: '+fun, +meditation' },
  nexusHub: { name: 'Nexus Hub', icon: '🔮', cost: { essence: 300, crystal: 10 }, desc: '+social, +harmony' },
  stellarTurret: { name: 'Stellar Turret', icon: '🔫', cost: { essence: 400, voidResidue: 5 }, desc: 'Auto- attacks enemies' },
  voidWall: { name: 'Void Wall', icon: '🛡', cost: { essence: 250, stone: 10 }, desc: 'Blocks enemies' },
  cosmicLab: { name: 'Cosmic Lab', icon: '🧪', cost: { essence: 500, crystal: 15, voidResidue: 5 }, desc: 'Research bonuses' }
};

function toggleBuildMode() {
  game.buildMode = !game.buildMode;
  const panel = document.getElementById('build-panel');
  if (game.buildMode) {
    const list = document.getElementById('build-list');
    list.innerHTML = '';
    for (const [key, s] of Object.entries(STRUCTURES)) {
      const costStr = Object.entries(s.cost).map(([r, a]) => `${a} ${r}`).join(', ');
      list.innerHTML += '<div class="build-item" onclick="buildStructure(\'' + key + '\')">' +
        '<span class="bi-icon">' + s.icon + '</span>' +
        '<div class="bi-info"><div class="bi-name">' + s.name + '</div><div class="bi-cost">' + costStr + '</div><div class="bi-desc">' + s.desc + '</div></div>' +
        '</div>';
    }
    panel.classList.add('show');
  } else {
    panel.classList.remove('show');
  }
}

function buildStructure(type) {
  const s = STRUCTURES[type];
  if (!s) return;
  // Check cost
  for (const [res, amt] of Object.entries(s.cost)) {
    if (res === 'essence' && game.essence < amt) { showToast('Not enough essence!'); return; }
    if (res === 'crystal' && game.resources.crystal < amt) { showToast('Not enough crystals!'); return; }
    if (res === 'voidResidue' && game.resources.voidResidue < amt) { showToast('Not enough void residue!'); return; }
    if (res === 'stone' && game.resources.stone < amt) { showToast('Not enough stone!'); return; }
  }
  // Pay cost
  for (const [res, amt] of Object.entries(s.cost)) {
    if (res === 'essence') game.essence -= amt;
    if (res === 'crystal') game.resources.crystal -= amt;
    if (res === 'voidResidue') game.resources.voidResidue -= amt;
    if (res === 'stone') game.resources.stone -= amt;
  }
  // Place near player
  const placeX = player.x + (Math.random() - 0.5) * 100;
  const placeY = player.y + (Math.random() - 0.5) * 100;
  game.structures.push({ type, x: Math.max(50, Math.min(WORLD_W - 50, placeX)), y: Math.max(50, Math.min(WORLD_H - 50, placeY)), hp: 100, time: Date.now(), level: 1 });
  addLog('🏗 Built ' + s.icon + ' ' + s.name);
  showToast('🏗 ' + s.name + ' constructed!');
  updateStats();
}

function tickBuildings() {
  game.structures.forEach(s => {
    if (s.type === 'essenceGeyser') { game.essence += 0.008; game.needs.energy = Math.min(100, game.needs.energy + 0.05); }
    if (s.type === 'meditationChamber') { game.meditation = Math.min(30, game.meditation + 0.005); game.needs.fun = Math.min(100, game.needs.fun + 0.1); }
    if (s.type === 'nexusHub') { game.harmony = Math.min(30, game.harmony + 0.003); game.needs.social = Math.min(100, game.needs.social + 0.1); }
  });
}

function renderStructures(ctx) {
  game.structures.forEach(s => {
    if (s.x < cam.x - 50 || s.x > cam.x + canvas.width + 50 || s.y < cam.y - 50 || s.y > cam.y + canvas.height + 50) return;
    const info = STRUCTURES[s.type];
    const alpha = 0.6 + Math.sin(Date.now() * 0.002 + s.time) * 0.2;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.shadowColor = '#00d4ff';
    ctx.shadowBlur = 10;
    ctx.font = '22px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(info.icon, s.x - cam.x, s.y - cam.y);
    // Level indicator
    ctx.shadowBlur = 0;
    ctx.font = '8px Arial';
    ctx.fillStyle = '#00d4ff';
    ctx.fillText('Lv.' + s.level, s.x - cam.x, s.y - cam.y - 16);
    ctx.globalAlpha = 1;
    ctx.restore();
  });
}

function interactStructure(wx, wy) {
  for (const s of game.structures) {
    if (Math.hypot(wx - s.x, wy - s.y) < 30) {
      const cost = Math.floor(100 + 50 * s.level);
      if (game.essence < cost) {
        showToast('Not enough essence to upgrade! (' + cost + ' needed)');
        return true;
      }
      game.essence -= cost;
      s.level++;
      showToast('⬆ ' + STRUCTURES[s.type].name + ' upgraded to Lv.' + s.level);
      addLog('⬆ Upgraded ' + STRUCTURES[s.type].name + ' to Lv.' + s.level);
      updateStats();
      return true;
    }
  }
  return false;
}

// === TOWER DEFENSE ===
function tickTD() {
  if (game.tdActive) {
    game.tdTimer++;
    // Move enemies toward player
    game.tdEnemies.forEach(e => {
      const dx = player.x - e.x, dy = player.y - e.y;
      const dist = Math.hypot(dx, dy);
      if (dist > 0) { e.x += (dx / dist) * e.speed; e.y += (dy / dist) * e.speed; }
      // Contact damage
      if (dist < 30) { player.hp = Math.max(0, player.hp - e.damage * 0.02); }
    });
    // Turrets auto-attack
    const turrets = game.structures.filter(s => s.type === 'stellarTurret');
    turrets.forEach(t => {
      if (game.tdEnemies.length > 0 && Math.random() < 0.05) {
        const target = game.tdEnemies[0];
        target.hp -= 8 + game.phase;
        if (target.hp <= 0) {
          const idx = game.tdEnemies.indexOf(target);
          if (idx > -1) {
            game.tdEnemies.splice(idx, 1);
            game.essence += 15 + game.tdWave * 2;
            for (let j = 0; j < 6; j++) particles.push({ x: t.x, y: t.y, vx: (Math.random() - 0.5) * 8, vy: (Math.random() - 0.5) * 8, size: 2, life: 0.5, color: '#00d4ff' });
          }
        }
      }
    });
    // Wave cleared
    if (game.tdEnemies.length === 0 && game.tdTimer > 60) {
      game.tdActive = false;
      game.tdCooldown = 60 - Math.min(game.tdWave, 30);
      const reward = 50 * game.tdWave + game.phase * 30;
      game.essence += reward;
      game.resources.voidResidue += game.tdWave;
      showToast('✦ Wave ' + game.tdWave + ' clear! +' + reward + ' essence');
      addLog('✦ Wave ' + game.tdWave + ' cleared! +' + reward);
      document.getElementById('td-hud').classList.remove('show');
      updateStats();
    }
  } else if (game.tdCooldown > 0) {
    game.tdCooldown -= 0.016;
  } else if (game.phase >= 2 && Math.random() < 0.0002) {
    startWave();
  }
}

function startWave() {
  if (game.tdActive || game.tdCooldown > 0) return;
  game.tdActive = true;
  game.tdWave++;
  game.tdTimer = 0;
  const count = 2 + game.tdWave + Math.floor(game.phase / 2);
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 300 + Math.random() * 100;
    game.tdEnemies.push({
      x: player.x + Math.cos(angle) * dist, y: player.y + Math.sin(angle) * dist,
      hp: 15 + game.tdWave * 5 + game.phase * 3,
      maxHp: 15 + game.tdWave * 5 + game.phase * 3,
      speed: 0.3 + game.tdWave * 0.02,
      damage: 3 + game.tdWave,
      icon: game.tdWave > 5 ? '🌀' : game.tdWave > 3 ? '👁' : '👾',
      color: game.tdWave > 5 ? '#ff4444' : game.tdWave > 3 ? '#ff8800' : '#ff6644'
    });
  }
  document.getElementById('td-hud').classList.add('show');
  document.getElementById('td-wave').textContent = 'Wave ' + game.tdWave;
  document.getElementById('td-count').textContent = 'Enemies: ' + count;
  showToast('⚡ Wave ' + game.tdWave + ' incoming!');
  addLog('⚡ Wave ' + game.tdWave + ' inbound!');
}

function renderTDEnemies(ctx) {
  game.tdEnemies.forEach(e => {
    if (e.x < cam.x - 50 || e.x > cam.x + canvas.width + 50 || e.y < cam.y - 50 || e.y > cam.y + canvas.height + 50) return;
    ctx.save();
    ctx.shadowColor = e.color;
    ctx.shadowBlur = 12;
    ctx.font = '22px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(e.icon, e.x - cam.x, e.y - cam.y);
    ctx.shadowBlur = 0;
    const hpPct = e.hp / e.maxHp;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(e.x - cam.x - 12, e.y - cam.y - 18, 24, 3);
    ctx.fillStyle = hpPct > 0.5 ? '#44ff44' : '#ff4444';
    ctx.fillRect(e.x - cam.x - 12, e.y - cam.y - 18, 24 * hpPct, 3);
    ctx.restore();
  });
}

// === BATTLE ARENA ===
function challengeAgent(agentKey) {
  if (game.arena.active) return;
  const agent = AGENTS[agentKey];
  game.arena = { active: true, agent: agentKey, playerHP: 100, enemyHP: 100, phase: 'fighting', timer: 0 };
  document.getElementById('arena-overlay').classList.add('show');
  document.getElementById('arena-vs').textContent = 'YOU vs ' + agent.icon + ' ' + agent.name;
  document.getElementById('arena-status').textContent = 'Fight! Click to attack!';
  document.getElementById('arena-buttons').innerHTML =
    '<button class="arena-btn" onclick="arenaAttack()">⚔ Attack</button>' +
    '<button class="arena-btn" onclick="arenaDodge()">🌀 Dodge</button>' +
    '<button class="arena-btn danger" onclick="closeArena()">Retreat</button>';
  updateArenaUI();
}

function arenaAttack() {
  if (game.arena.phase !== 'fighting') return;
  const dmg = 8 + game.phase * 2 + game.entanglement * 0.3 + Math.random() * 5;
  game.arena.enemyHP -= dmg;
  addLog('⚔ Hit! -' + Math.floor(dmg));
  if (game.arena.enemyHP <= 0) { arenaWin(); }
  else { const cdmg = 3 + game.voidEssence * 0.1; if (Math.random() > game.entanglement / 200) game.arena.playerHP -= cdmg; }
  updateArenaUI();
}

function arenaDodge() {
  if (game.arena.phase !== 'fighting') return;
  if (Math.random() < 0.6) { showToast('🌀 Dodged!'); }
  else { const dmg = 4 + game.phase; game.arena.playerHP -= dmg; showToast('💥 Hit! -' + Math.floor(dmg)); if (game.arena.playerHP <= 0) arenaLose(); }
  updateArenaUI();
}

function arenaWin() {
  game.arena.phase = 'won';
  const bonus = Math.floor(100 + game.phase * 40 + game.arena.enemyHP);
  game.essence += bonus;
  addAlignment(game.arena.agent, 8);
  game.resources.essenceShard += 3;
  document.getElementById('arena-status').textContent = '✦ VICTORY! +' + bonus + ' essence ✦';
  document.getElementById('arena-buttons').innerHTML = '<button class="arena-btn" onclick="closeArena()">Claim Reward</button>';
  showToast('✦ Arena victory! +' + bonus);
  updateStats();
}

function arenaLose() {
  game.arena.phase = 'lost';
  document.getElementById('arena-status').textContent = '💀 Defeated. Rest and try again.';
  document.getElementById('arena-buttons').innerHTML = '<button class="arena-btn" onclick="closeArena()">Retreat</button>';
  game.needs.energy = Math.max(0, game.needs.energy - 15);
}

function closeArena() {
  document.getElementById('arena-overlay').classList.remove('show');
  game.arena.active = false;
}

function updateArenaUI() {
  document.getElementById('arena-player-hp').style.width = Math.max(0, game.arena.playerHP) + '%';
  document.getElementById('arena-player-hp-val').textContent = Math.floor(Math.max(0, game.arena.playerHP));
  document.getElementById('arena-enemy-hp').style.width = Math.max(0, game.arena.enemyHP) + '%';
  document.getElementById('arena-enemy-hp-val').textContent = Math.floor(Math.max(0, game.arena.enemyHP));
}

// === RENDER WORLD ===
function renderWorld(ctx) {
  ctx.save();
  ctx.translate(-cam.x, -cam.y);
  
  // Draw zone backgrounds
  WORLD_ZONES.forEach(z => {
    ctx.fillStyle = z.color + '08';
    ctx.fillRect(z.x, z.y, z.w, z.h);
    ctx.strokeStyle = z.color + '20';
    ctx.lineWidth = 1;
    ctx.strokeRect(z.x, z.y, z.w, z.h);
    ctx.fillStyle = z.color + '40';
    ctx.font = '14px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(z.name, z.x + z.w / 2, z.y + 20);
  });
  
  // World border
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.lineWidth = 2;
  ctx.strokeRect(0, 0, WORLD_W, WORLD_H);
  
  // Resource nodes
  resourceNodes.forEach(r => {
    r.pulse += 0.03;
    const alpha = 0.4 + Math.sin(r.pulse) * 0.25;
    ctx.fillStyle = `rgba(255,215,0,${alpha})`;
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(r.x, r.y, 6 + Math.sin(r.pulse) * 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  });

  // Entities (existing)
  entities.forEach(e => {
    if (e.x < cam.x - 50 || e.x > cam.x + canvas.width + 50 || e.y < cam.y - 50 || e.y > cam.y + canvas.height + 50) return;
    if (e.type === 'amoeba') {
      e.x += e.vx; e.y += e.vy; e.pulse += 0.085; e.wobble += 0.055;
      if (e.x < -45) e.x = WORLD_W + 45; if (e.x > WORLD_W + 45) e.x = -45;
      if (e.y < -45) e.y = WORLD_H * 0.5 + 45; if (e.y > WORLD_H * 0.5 + 45) e.y = -45;
      ctx.fillStyle = `hsla(${e.hue},70%,45%,0.75)`;
      ctx.shadowColor = `hsla(${e.hue},70%,50%,0.9)`;
      ctx.shadowBlur = 10;
      ctx.beginPath();
      for(let i = 0; i < 8; i++) {
        const a = (i / 8) * Math.PI * 2 + e.wobble;
        const w = Math.sin(e.pulse + i * 0.5) * 2.5;
        const px = e.x + Math.cos(a) * (e.size + w);
        const py = e.y + Math.sin(a) * (e.size + w);
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.closePath(); ctx.fill(); ctx.shadowBlur = 0;
      ctx.fillStyle = '#fff';
      for(let i = 0; i < 2; i++) {
        ctx.beginPath();
        ctx.arc(e.x + Math.cos(i * 3 + e.pulse) * e.size * 0.28, e.y + Math.sin(i * 3 + e.pulse) * e.size * 0.28, 1.8, 0, Math.PI * 2);
        ctx.fill();
      }
    } else if (e.type === 'nutrient') {
      e.pulse += 0.055;
      ctx.fillStyle = `hsla(${e.hue},80%,55%,${0.4 + Math.sin(e.pulse) * 0.25})`;
      ctx.beginPath(); ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2); ctx.fill();
    } else if (e.type === 'crystal') {
      e.pulse += 0.04;
      ctx.fillStyle = `hsla(${e.hue},60%,60%,${0.5 + Math.sin(e.pulse) * 0.3})`;
      ctx.shadowColor = `hsla(${e.hue},60%,60%,0.8)`; ctx.shadowBlur = 8;
      ctx.beginPath();
      for(let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2 + e.pulse;
        const r = e.size * (0.7 + Math.sin(e.pulse * 2 + i) * 0.3);
        if (i === 0) ctx.moveTo(e.x + Math.cos(a) * r, e.y + Math.sin(a) * r);
        else ctx.lineTo(e.x + Math.cos(a) * r, e.y + Math.sin(a) * r);
      }
      ctx.closePath(); ctx.fill(); ctx.shadowBlur = 0;
    }
  });

  // Auto-collect
  entities = entities.filter(e => {
    const dist = Math.hypot(e.x - player.x, e.y - player.y);
    if (dist < player.size + e.size + 15) {
      const val = e.type === 'nutrient' ? 2 : e.type === 'crystal' ? 8 : 4;
      game.essence += val;
      game.biomass += val * 0.08;
      if (e.type === 'crystal') game.quantum += val * 0.1;
      floatingTexts.push({ x: player.x, y: player.y - 20, text: '+' + val, color: '#88ff88', life: 0.6, vy: -2 });
      for (let j = 0; j < 5; j++) particles.push({ x: e.x, y: e.y, vx: (Math.random() - 0.5) * 5, vy: (Math.random() - 0.5) * 5, size: 2, life: 0.6, color: `hsla(${e.hue || 120},80%,55%,1)` });
      return false;
    }
    if (dist < (player.size + e.size + 15) * 3) {
      e.x += (player.x - e.x) * 0.02;
      e.y += (player.y - e.y) * 0.02;
    }
    return true;
  });

  // Structures
  renderStructures(ctx);
  
  // TD enemies
  renderTDEnemies(ctx);
  
  // NPCs
  renderNPC(ctx);
  
  ctx.restore();
  
  // Mini-map
  renderMiniMap();
}

// === MINI-MAP ===
function renderMiniMap() {
  const mmSize = 120, mmX = canvas.width - mmSize - 10, mmY = 10;
  const scale = mmSize / Math.max(WORLD_W, WORLD_H);
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(mmX, mmY, mmSize, mmSize);
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.strokeRect(mmX, mmY, mmSize, mmSize);
  // Player dot
  ctx.fillStyle = '#ffd700';
  ctx.beginPath();
  ctx.arc(mmX + player.x * scale, mmY + player.y * scale, 3, 0, Math.PI * 2);
  ctx.fill();
  // Structure dots
  ctx.fillStyle = '#00d4ff';
  game.structures.forEach(s => {
    ctx.fillRect(mmX + s.x * scale - 1, mmY + s.y * scale - 1, 2, 2);
  });
  // NPC dots
  ctx.fillStyle = '#ff6b9d';
  game.npcs.forEach(n => {
    ctx.fillRect(mmX + n.x * scale - 1, mmY + n.y * scale - 1, 2, 2);
  });
  // TD enemies
  ctx.fillStyle = '#ff4444';
  game.tdEnemies.forEach(e => {
    ctx.fillRect(mmX + e.x * scale - 1, mmY + e.y * scale - 1, 2, 2);
  });
  // Resource nodes
  ctx.fillStyle = '#ffd70044';
  resourceNodes.forEach(r => {
    ctx.fillRect(mmX + r.x * scale - 1, mmY + r.y * scale - 1, 1, 1);
  });
}

// === ENHANCED CHARACTER RENDERING ===
const character = { eyeTarget: { x: 0, y: 0 }, eyePos: { x: 0, y: 0 } };

function renderCharacter(ctx, x, y, size, path, phase, pulse, lookX, lookY, pathColor) {
  ctx.save();
  ctx.translate(x, y);
  
  const hue = path === 'quantum' ? 280 : path === 'plant' ? 100 : path === 'cosmic' ? 320 : path === 'void' ? 0 : 160;
  const wobble = Math.sin(pulse) * 4;
  const breath = Math.sin(pulse * 0.7) * 3 + 1;
  
  // Outer aura glow
  const auraSize = size * (1.8 + Math.sin(pulse * 0.3) * 0.15);
  const auraGrad = ctx.createRadialGradient(0, 0, size * 0.2, 0, 0, auraSize);
  auraGrad.addColorStop(0, `hsla(${hue},80%,55%,0.12)`);
  auraGrad.addColorStop(0.4, `hsla(${hue + 30},70%,45%,0.06)`);
  auraGrad.addColorStop(1, `hsla(${hue + 60},60%,30%,0)`);
  ctx.fillStyle = auraGrad;
  ctx.shadowColor = pathColor;
  ctx.shadowBlur = 30;
  ctx.beginPath();
  ctx.arc(0, 0, auraSize, 0, Math.PI * 2);
  ctx.fill();
  
  // Orbiting particles based on phase
  const numOrbits = Math.min(phase + 2, 14);
  for (let i = 0; i < numOrbits; i++) {
    const angle = (i / numOrbits) * Math.PI * 2 + pulse * (0.4 + i * 0.04);
    const dist = size * (0.75 + Math.sin(pulse * 0.5 + i * 0.3) * 0.12);
    const pSize = 1.2 + Math.sin(pulse + i * 2) * 0.8;
    ctx.fillStyle = `hsla(${hue + i * 15},80%,60%,${0.35 + Math.sin(pulse + i) * 0.2})`;
    ctx.shadowColor = pathColor;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(Math.cos(angle) * dist, Math.sin(angle) * dist, Math.max(0.5, pSize), 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Core glow
  ctx.shadowColor = pathColor;
  ctx.shadowBlur = 22;
  
  const glowPulse = 1 + Math.sin(pulse * 0.5) * 0.04;
  
  if (path === 'void') {
    // VOID: Dark vortex with shadow tendrils
    const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, size * glowPulse + wobble);
    grad.addColorStop(0, '#444');
    grad.addColorStop(0.3, '#222');
    grad.addColorStop(0.6, '#111');
    grad.addColorStop(1, 'rgba(0,0,0,0.8)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, size * glowPulse + wobble, 0, Math.PI * 2);
    ctx.fill();
    
    // Swirl tendrils
    ctx.strokeStyle = 'rgba(80,80,80,0.25)';
    ctx.lineWidth = 1.5;
    for (let i = 0; i < 8; i++) {
      const a = (i / 8) * Math.PI * 2 + pulse * 0.6;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a) * size * 0.2, Math.sin(a) * size * 0.2);
      const midA = a + 0.3 + Math.sin(pulse + i) * 0.2;
      const midR = size * 0.7;
      ctx.quadraticCurveTo(
        Math.cos(midA) * midR, Math.sin(midA) * midR,
        Math.cos(a) * size * 1.2, Math.sin(a) * size * 1.2
      );
      ctx.stroke();
    }
  } else if (path === 'quantum') {
    // QUANTUM: Geometric crystal form
    const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, size * glowPulse + wobble);
    grad.addColorStop(0, `hsl(${hue},85%,55%)`);
    grad.addColorStop(0.5, `hsl(${hue + 20},75%,40%)`);
    grad.addColorStop(1, `hsl(${hue + 40},65%,20%)`);
    ctx.fillStyle = grad;
    
    // Hexagonal body
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * Math.PI * 2 + pulse * 0.3;
      const r = size * glowPulse + wobble + Math.sin(pulse * 0.5 + i) * 4;
      const px = Math.cos(a) * r;
      const py = Math.sin(a) * r;
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();
    
    // Inner probability rings
    ctx.strokeStyle = `hsla(${hue + 60},70%,55%,0.25)`;
    ctx.lineWidth = 1.2;
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.arc(0, 0, size * (0.2 + i * 0.18), 0, Math.PI * 2);
      ctx.stroke();
    }
  } else {
    // ORGANIC (primordial, plant, cosmic): Living being form
    const grad = ctx.createRadialGradient(0, -size * 0.1, 0, 0, 0, size * glowPulse + wobble);
    grad.addColorStop(0, `hsl(${hue},80%,60%)`);
    grad.addColorStop(0.5, `hsl(${hue + 15},70%,45%)`);
    grad.addColorStop(1, `hsl(${hue + 40},60%,28%)`);
    ctx.fillStyle = grad;
    
    ctx.beginPath();
    ctx.ellipse(0, 0, size * glowPulse + wobble, size * glowPulse - wobble * 0.35 + breath * 0.5, pulse * 0.1, 0, Math.PI * 2);
    ctx.fill();
    
    // Appendages for higher phases (primordial/cosmic)
    if (phase >= 3 && path !== 'plant') {
      const numApp = Math.min(phase - 2, 4);
      for (let i = 0; i < numApp; i++) {
        const a = (i / numApp) * Math.PI * 2 + pulse * 0.2 + 1.2;
        const len = size * (0.35 + Math.sin(pulse + i * 0.7) * 0.12);
        ctx.strokeStyle = `hsla(${hue + 30},70%,50%,${0.4 + Math.sin(pulse + i * 0.5) * 0.15})`;
        ctx.lineWidth = 2 + Math.sin(pulse + i) * 0.5;
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a) * size * 0.5, Math.sin(a) * size * 0.5);
        const ex = Math.cos(a) * (size * 0.5 + len);
        const ey = Math.sin(a) * (size * 0.5 + len);
        const cx = Math.cos(a + 0.4 * Math.sin(pulse + i)) * (size * 0.5 + len * 0.4);
        const cy = Math.sin(a + 0.4 * Math.sin(pulse + i)) * (size * 0.5 + len * 0.4);
        ctx.quadraticCurveTo(cx, cy, ex, ey);
        ctx.stroke();
      }
    }
    
    // Plant: leaf petals
    if (path === 'plant') {
      const numPetals = Math.min(phase + 2, 8);
      for (let i = 0; i < numPetals; i++) {
        const a = (i / numPetals) * Math.PI * 2 + pulse * 0.15;
        const len = size * 0.25 * (1 + Math.sin(pulse + i * 0.5) * 0.2);
        ctx.fillStyle = `hsla(${hue + 20},60%,40%,${0.25 + Math.sin(pulse + i) * 0.1})`;
        ctx.shadowBlur = 5;
        ctx.beginPath();
        ctx.ellipse(
          Math.cos(a) * size * 0.65, Math.sin(a) * size * 0.65,
          len * 0.6, len * 0.15,
          a, 0, Math.PI * 2
        );
        ctx.fill();
      }
    }
  }
  
  ctx.shadowBlur = 0;
  
  // Eyes (all except void)
  if (path !== 'void') {
    const eyeSpread = size * 0.22;
    const eyeY = -size * 0.1;
    const eyeR = size * 0.13;
    
    const dx = lookX - x;
    const dy = lookY - y;
    const d = Math.hypot(dx, dy);
    const lookMag = Math.min(1, d / 250) * size * 0.045;
    const lx = d > 0 ? (dx / d) * lookMag : 0;
    const ly = d > 0 ? (dy / d) * lookMag : 0;
    
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(-eyeSpread, eyeY, eyeR, 0, Math.PI * 2);
    ctx.arc(eyeSpread, eyeY, eyeR, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = path === 'quantum' ? '#8800ff' : '#111';
    ctx.beginPath();
    ctx.arc(-eyeSpread + lx, eyeY + ly, eyeR * 0.5, 0, Math.PI * 2);
    ctx.arc(eyeSpread + lx, eyeY + ly, eyeR * 0.5, 0, Math.PI * 2);
    ctx.fill();
    
    // Pupil highlight
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.beginPath();
    ctx.arc(-eyeSpread + lx - eyeR * 0.15, eyeY + ly - eyeR * 0.15, eyeR * 0.15, 0, Math.PI * 2);
    ctx.arc(eyeSpread + lx - eyeR * 0.15, eyeY + ly - eyeR * 0.15, eyeR * 0.15, 0, Math.PI * 2);
    ctx.fill();
  }
  
  // Aim indicator beam - pulses toward mouse direction
  ctx.strokeStyle = `hsla(${hue},70%,55%,${0.15 + Math.sin(pulse * 2) * 0.08})`;
  ctx.lineWidth = 1.5;
  ctx.shadowColor = pathColor;
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  const aimDist = size * (0.8 + Math.sin(pulse * 0.5) * 0.1);
  const aimAngle = player.angle || 0;
  ctx.lineTo(Math.cos(aimAngle) * (size + aimDist), Math.sin(aimAngle) * (size + aimDist));
  ctx.stroke();
  ctx.shadowBlur = 0;
  
  // Direction glow dot at end of beam
  ctx.fillStyle = `hsla(${hue},70%,55%,${0.3 + Math.sin(pulse * 3) * 0.15})`;
  ctx.shadowColor = pathColor;
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.arc(Math.cos(aimAngle) * (size + aimDist), Math.sin(aimAngle) * (size + aimDist), 2.5 + Math.sin(pulse * 2) * 0.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  
  ctx.restore();
}

STORIES.quantum = STORIES.primordial.map((s, i) => ({ ...s, title: s.title, text: s.text.replace(/cell/g, 'state').replace(/flesh/g, 'probability').replace(/brain/g, 'waveform') }));
STORIES.void = STORIES.primordial.map((s, i) => ({ ...s, title: s.title, text: s.text.replace(/cell/g, 'absence').replace(/flesh/g, 'nothing').replace(/brain/g, 'void') }));

let storyShown = {};

function showStory(path, phase) {
  const key = path + '-' + phase;
  if (storyShown[key]) return;
  const stories = STORIES[path] || STORIES.primordial;
  const story = stories[Math.min(phase, stories.length - 1)];
  if (!story) return;
  storyShown[key] = true;
  document.getElementById('story-chapter').textContent = story.chapter;
  document.getElementById('story-title').textContent = story.title;
  document.getElementById('story-text').textContent = story.text;
  document.getElementById('story-choices').innerHTML = '';
  document.getElementById('story-close-btn').style.display = 'inline-block';
  document.getElementById('story-overlay').classList.add('show');
}

function closeStory() {
  document.getElementById('story-overlay').classList.remove('show');
}

// === TOAST SYSTEM ===
function showToast(text, duration) {
  const container = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = text;
  container.appendChild(el);
  setTimeout(() => el.remove(), duration || 2500);
}
