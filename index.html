  shaddai: { name: 'SHADDAI', icon: '◈', color: '#ffd700', port: 8000, role: 'Orchestrator', desc: 'Evolution & progress',
    action: 'evolve', bonus: () => 30 + game.phase * 15 },
  zerox: { name: 'ZEROX', icon: '₿', color: '#00ff88', port: 8001, role: 'Wealth', desc: 'Essence & efficiency',
    action: 'click', bonus: () => 50 + game.essence * 0.1 },
  oracle: { name: 'ORACLE', icon: '◉', color: '#9B30FF', port: 8002, role: 'Wisdom', desc: 'Knowledge & entanglement',
    action: 'entangle', bonus: () => 20 + game.entanglement * 2 },
  nexus: { name: 'NEXUS', icon: '⊞', color: '#00d4ff', port: 8003, role: 'Architect', desc: 'Connections & automation',
    action: 'auto', bonus: () => 15 + game.autoRate * 5 },
  turtle: { name: 'TURTLE', icon: '✦', color: '#ff6b9d', port: 8004, role: 'Creator', desc: 'Beauty & meditation',
    action: 'meditate', bonus: () => 25 + game.meditation * 3 },
  quill: { name: 'QUILL', icon: '✎', color: '#ffaa00', port: 8005, role: 'Scribe', desc: 'Harmony & lore',
    action: 'harmony', bonus: () => 20 + game.harmony * 4 },
  pikadon: { name: 'PIKADON', icon: '⬡', color: '#ff4444', port: 8008, role: 'Guardian', desc: 'Protection & void',
    action: 'void', bonus: () => 35 + game.voidEssence }
};

const ASCENT_BONUSES = {
  shaddai: { desc: 'Start at Phase 3, +50% click power', phase: 2, cp: 1.5 },
  zerox: { desc: '+100 starting essence, +2x moon bonus', essence: 100, moon: 2 },
  oracle: { desc: 'Start with 30% entanglement', entangle: 30 },
  nexus: { desc: '+5 auto-rate from start', auto: 5 },
  turtle: { desc: '+20 meditation, double particles', meditate: 20, particles: true },
  quill: { desc: '+15 harmony, unlock lore echoes', harmony: 15 },
  pikadon: { desc: 'No essence decay, void resistance', resist: true }
};

function addAlignment(agent, amount) {
  if (!game.alignment[agent]) game.alignment[agent] = 0;
  game.alignment[agent] = Math.min(100, game.alignment[agent] + amount);
}

function getTopAlignment() {
  let top = 'shaddai', max = 0;
  for (const [k, v] of Object.entries(game.alignment)) {
    if (v > max) { max = v; top = k; }
  }
  return max > 0 ? top : null;
}

function toggleAlignment() {
  const panel = document.getElementById('align-panel');
  panel.classList.toggle('show');
  if (panel.classList.contains('show')) updateAlignmentPanel();
}

function updateAlignmentPanel() {
  const list = document.getElementById('align-list');
  list.innerHTML = '';
  for (const [key, agent] of Object.entries(AGENTS)) {
    const val = Math.floor(game.alignment[key] || 0);
    const row = document.createElement('div');
    row.className = 'align-row';
    row.innerHTML = `
      <span class="al-icon">${agent.icon}</span>
      <span class="al-name">${agent.name}</span>
      <div class="al-bar"><div class="al-fill" style="width:${val}%;background:${agent.color}"></div></div>
      <span class="al-val">${val}</span>
    `;
    row.style.cursor = 'default';
    row.title = agent.name + ' — alignment: ' + val + '/100';
    list.appendChild(row);
  }
}

// === AGENT ENCOUNTERS ===
// === AGENT COUNCIL ===
function triggerCouncil() {
  if (game.councilDone) return;

  let total = 0;
  const grid = document.getElementById('council-grid');
  grid.innerHTML = '';

  const verdicts = [];

  for (const [key, agent] of Object.entries(AGENTS)) {
    const align = game.alignment[key] || 0;
    let score = 0;
    let verdict = '';

    switch (key) {
      case 'shaddai':
        score = Math.floor(game.phase * 7 + align * 0.3);
        verdict = game.phase >= 12 ? '✦ Transcended form' : (game.phase >= 8 ? '◈ High evolution' : '◇ Still evolving');
        break;
      case 'zerox':
        score = Math.floor(Math.min(100, game.essence / 500 + align * 0.4));
        verdict = game.essence > 10000 ? '₿ Wealth of worlds' : (game.essence > 3000 ? '₿ Growing fortune' : '₿ Humble beginnings');
        break;
      case 'oracle':
        score = Math.floor(game.entanglement * 0.6 + align * 0.4);
        verdict = game.entanglement > 80 ? '◉ Sees all' : (game.entanglement > 40 ? '◉ Piercing veil' : '◉ Clouded vision');
        break;
      case 'nexus':
        score = Math.floor(Math.min(100, game.autoRate * 3 + align * 0.5));
        verdict = game.autoRate > 20 ? '⊞ Perfect network' : (game.autoRate > 8 ? '⊞ Growing web' : '⊞ Sparse connections');
        break;
      case 'turtle':
        score = Math.floor(game.meditation * 1.2 + align * 0.3);
        verdict = game.meditation > 30 ? '✦ Creative peak' : (game.meditation > 10 ? '✦ Finding beauty' : '✦ Uninspired');
        break;
      case 'quill':
        score = Math.floor(game.harmony * 1.5 + align * 0.3);
        verdict = game.harmony > 20 ? '✎ Perfect harmony' : (game.harmony > 8 ? '✎ Melodic' : '✎ Dissonant');
        break;
      case 'pikadon':
        const resisted = game.voidEssence > 0 ? Math.min(30, game.voidEssence * 0.5) : 0;
        score = Math.floor(resisted + align * 0.5);
        verdict = game.voidEssence > 50 ? '⬡ Void-tempered' : (game.voidEssence > 10 ? '⬡ Guarded' : '⬡ Untested');
        break;
    }

    score = Math.min(100, Math.max(0, Math.floor(score)));
    total += score;

    const card = document.createElement('div');
    card.className = 'council-card';
    card.style.setProperty('--accent-color', agent.color);
    card.innerHTML = `
      <div class="cc-header">
        <span class="cc-name" style="color:${agent.color}">${agent.icon} ${agent.name}</span>
        <span class="cc-icon">${agent.icon}</span>
      </div>
      <div class="cc-score">${score}/100</div>
      <div class="cc-verdict">${verdict}</div>
    `;
    grid.appendChild(card);
  }

  game.councilScore = total;
  document.getElementById('council-total').textContent = '✦ ' + total + ' / 700 ✦';

  let desc = '';
  if (total >= 550) desc = 'THE COUNCIL HAILS YOU. True Transcendence achieved. Your name echoes across all realities.';
  else if (total >= 400) desc = 'The Council recognizes your power. You stand among the ascended.';
  else if (total >= 250) desc = 'The Council acknowledges your journey. There is still more to transcend.';
  else desc = 'The Council watches in silence. Your path has only just begun.';
  document.getElementById('council-desc').textContent = desc;

  document.getElementById('council-overlay').classList.add('show');
  addLog('═══════════════════════════');
  addLog('⚖️ AGENT COUNCIL: ' + total + '/700');
  addLog(desc);
  addLog('═══════════════════════════');
}

function saveCouncilScore() {
  const scores = JSON.parse(localStorage.getItem('apophenoth_scores') || '[]');
  const topAgent = getTopAlignment();
  scores.push({
    score: game.councilScore,
    path: game.path,
    phase: game.phase,
    topAgent: topAgent,
    date: new Date().toLocaleDateString()
  });
  scores.sort((a, b) => b.score - a.score);
  if (scores.length > 20) scores.length = 20;
  localStorage.setItem('apophenoth_scores', JSON.stringify(scores));
  addLog('✦ Score recorded: ' + game.councilScore + '/700');
  showLeaderboard();
}

function closeCouncil() {
  document.getElementById('council-overlay').classList.remove('show');
  game.councilDone = true;
  const scores = JSON.parse(localStorage.getItem('apophenoth_scores') || '[]');
  const topAgent = getTopAlignment();
  scores.push({
    score: game.councilScore,
    path: game.path,
    phase: game.phase,
    topAgent: topAgent,
    date: new Date().toLocaleDateString()
  });
  scores.sort((a, b) => b.score - a.score);
  if (scores.length > 20) scores.length = 20;
  localStorage.setItem('apophenoth_scores', JSON.stringify(scores));
  addLog('✦ Score saved: ' + game.councilScore + '/700');
}

// === LEADERBOARD ===
function showLeaderboard() {
  const scores = JSON.parse(localStorage.getItem('apophenoth_scores') || '[]');
  const list = document.getElementById('leaderboard-list');
  list.innerHTML = '';

  if (scores.length === 0) {
    list.innerHTML = '<div class="lb-empty">No scores recorded yet.<br>Reach 33° to face the Agent Council.</div>';
  } else {
    scores.forEach((s, i) => {
      const entry = document.createElement('div');
      entry.className = 'lb-entry' + (i === 0 ? ' top1' : i === 1 ? ' top2' : i === 2 ? ' top3' : '');
      const agentName = s.topAgent ? AGENTS[s.topAgent]?.name || 'None' : 'None';
      entry.innerHTML = `
        <span class="lb-rank">#${i + 1}</span>
        <span class="lb-name">${s.score}</span>
        <span class="lb-detail">${s.path} · Phase ${s.phase} · ${agentName}</span>
        <span class="lb-detail">${s.date}</span>
      `;
      list.appendChild(entry);
    });
  }

  document.getElementById('leaderboard-overlay').classList.add('show');
}

function closeLeaderboard() {
  document.getElementById('leaderboard-overlay').classList.remove('show');
}

function recordScore() {
  if (game.phase >= 12 && !game.councilDone) {
    triggerCouncil();
  } else if (game.phase >= 12) {
    saveCouncilScoreDirect();
  }
}

function saveCouncilScoreDirect() {
  const scores = JSON.parse(localStorage.getItem('apophenoth_scores') || '[]');
  const topAgent = getTopAlignment();
  scores.push({
    score: Math.floor(game.entanglement * 2 + game.phase * 20 + game.essence / 1000),
    path: game.path,
    phase: game.phase,
    topAgent: topAgent,
    date: new Date().toLocaleDateString()
  });
  scores.sort((a, b) => b.score - a.score);
  if (scores.length > 20) scores.length = 20;
  localStorage.setItem('apophenoth_scores', JSON.stringify(scores));
  addLog('✦ Score recorded!');
  showLeaderboard();
}

const _origEvolve = evolve;
evolve = function() {
  const pathData = PATHS[game.path];
  const phases = pathData.phases;
  const cost = COSTS[Math.min(game.phase + 1, COSTS.length - 1)];
  if (game.phase < phases.length - 1 && game.essence >= cost) {
    _origEvolve();
    addAlignment('shaddai', 5);
    addAlignment('nexus', 2);
    showStory(game.path, game.phase);
    if (game.phase === 12) {
      setTimeout(triggerCouncil, 1500);
    }
  }
};

// === MODIFIED startGame for Ascent Mode ===
const _origStartGame = startGame;
startGame = function() {
  _origStartGame();
  game.ascentAgent = selectedAscentAgent;
  game.councilDone = false;
  game.councilScore = 0;
  game.alignment = { shaddai: 0, zerox: 0, oracle: 0, nexus: 0, turtle: 0, quill: 0, pikadon: 0 };
  storyShown = {};
  setTimeout(() => showStory(game.path, game.phase), 500);

  if (selectedAscentAgent) {
    const bonus = ASCENT_BONUSES[selectedAscentAgent];
    const agent = AGENTS[selectedAscentAgent];
    if (bonus) {
      if (bonus.phase) game.phase = bonus.phase;
      if (bonus.cp) game.clickPower = bonus.cp;
      if (bonus.essence) game.essence = bonus.essence;
      if (bonus.auto) game.autoRate = bonus.auto;
      if (bonus.meditate) game.meditation = bonus.meditate;
      if (bonus.harmony) game.harmony = bonus.harmony;
      if (bonus.entangle) game.entanglement = bonus.entangle;
    }
    addLog('✦ INVOKED: ' + agent.name + ' ' + agent.icon);
    addLog('✦ ' + bonus.desc);
    addLog('═══════════════════════════');
  }
  // Reset player state
  player.vx = 0; player.vy = 0;
};

// === ASCENT MODE MENU ===
let selectedAscentAgent = null;

function selectAscent(agent, elem) {
  document.querySelectorAll('.ascent-btn').forEach(b => b.classList.remove('selected'));
  elem.classList.add('selected');
  selectedAscentAgent = agent;
  const bonus = ASCENT_BONUSES[agent];
  document.getElementById('ascent-info').textContent = AGENTS[agent].icon + ' ' + AGENTS[agent].name + ': ' + bonus.desc;
}

function clearAscent() {
  document.querySelectorAll('.ascent-btn').forEach(b => b.classList.remove('selected'));
  selectedAscentAgent = null;
  document.getElementById('ascent-info').textContent = 'Start clean. No agent invocation.';
}
